name: pig_scale_app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- State Management ---
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^7.6.0 # Dependency Injection

  # --- Database (Drift/SQLite) ---
  drift: ^2.13.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3

  # --- Utilities ---
  intl: ^0.19.0 # Format tiền tệ, ngày tháng
  uuid: ^4.2.1 # Tạo ID duy nhất
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  
  # --- Code Generation ---
  build_runner: ^2.4.6
  drift_dev: ^2.13.0